<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#7c6fcd">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TRANQUIL">
<link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TRANQUIL – Daily Quotes</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/dark.css"/>
  <style>
    .quote-card {
      background: linear-gradient(135deg, var(--purple-bg), var(--card));
      border-radius: var(--radius);
      padding: 32px 24px;
      text-align: center;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      min-height: 300px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .quote-icon {
      font-size: 3rem;
      margin-bottom: 20px;
      opacity: 0.7;
    }
    .quote-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 20px;
    }
    .quote-author {
      font-size: 0.9rem;
      color: var(--purple);
      font-weight: 600;
    }
    .quote-category {
      display: inline-block;
      background: var(--purple-bg);
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.7rem;
      margin-top: 12px;
    }
    .favorite-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .favorite-btn:hover { transform: scale(1.1); }
    .favorite-btn.active { color: #f5c842; }
    
    /* Dark mode specific overrides for this page */
    body.dark-mode .quote-card {
      background: linear-gradient(135deg, #1a1a2e, #252b3d) !important;
      border-color: #2d2d44 !important;
    }
    
    body.dark-mode .quote-text {
      color: #ffffff !important;
    }
    
    body.dark-mode .quote-author {
      color: #9d8cff !important;
    }
    
    body.dark-mode .quote-category {
      background: rgba(157, 140, 255, 0.15) !important;
      color: #9d8cff !important;
    }
    
    body.dark-mode .favorite-btn {
      color: #a8b3cf !important;
    }
    
    body.dark-mode .favorite-btn.active {
      color: #ffda6e !important;
    }
    
    body.dark-mode #favoritesList {
      background: #1e1e2e !important;
      border-color: #2d2d44 !important;
    }
    
    body.dark-mode #favoritesList div {
      border-bottom-color: #2d2d44 !important;
    }
    
    body.dark-mode #favoritesList div div:first-child {
      color: #a8b3cf !important;
    }
    
    body.dark-mode .journal-empty {
      color: #6c7892 !important;
    }
  </style>
</head>
<body>

<div class="app-wrapper">

  <header class="top-header">
    <div class="header-brand">
      <div class="header-avatar" id="headerAvatar" onclick="window.location.href='profile.html'">🧘</div>
      <span class="header-title">TRANQUIL</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="window.location.href='ai-tips.html'">💡</button>
      <button class="icon-btn" onclick="window.location.href='profile.html'">🧘</button>
      <button class="icon-btn" onclick="window.location.href='settings.html'">⚙️</button>
    </div>
  </header>

  <main class="page-content">
    <button class="back-btn" onclick="history.back()">← Back</button>
    <h1 class="page-title">Daily Quotes 💭</h1>
    <p class="page-subtitle">Inspiration for your day</p>

    <div class="quote-card" id="quoteCard">
      <div class="quote-icon" id="quoteIcon">💭</div>
      <div class="quote-text" id="quoteText">Loading inspiration...</div>
      <div class="quote-author" id="quoteAuthor"></div>
      <div class="quote-category" id="quoteCategory"></div>
    </div>

    <div style="display: flex; gap: 12px; justify-content: center; margin-bottom: 20px;">
      <button class="btn btn-primary" onclick="newQuote()">✨ New Quote</button>
      <button class="favorite-btn" id="favoriteBtn" onclick="toggleFavorite()">🤍</button>
    </div>

    <div class="section-label">⭐ YOUR FAVORITES</div>
    <div id="favoritesList" class="card card-pad" style="max-height: 300px; overflow-y: auto;"></div>
  </main>

  <nav class="bottom-nav">
    <a class="nav-item" href="home.html"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
    <a class="nav-item" href="breathe.html"><span class="nav-icon">🌬️</span><span class="nav-label">Breathe</span></a>
    <a class="nav-item" href="sounds.html"><span class="nav-icon">🎵</span><span class="nav-label">Sounds</span></a>
    <a class="nav-item" href="journal.html"><span class="nav-icon">📔</span><span class="nav-label">Journal</span></a>
    <a class="nav-item" href="analytics.html"><span class="nav-icon">📊</span><span class="nav-label">Analytics</span></a>
    <a class="nav-item active" href="menu-hub.html"><span class="nav-icon">🌟</span><span class="nav-label">Hub</span></a>
  </nav>

</div>

<div class="toast" id="globalToast"></div>

<script src="js/app.js"></script>
<script src="js/dark.js"></script>

<script>
const quotes = [
  { text: "The only way to do great work is to love what you do.", author: "Steve Jobs", category: "Motivation", icon: "💪" },
  { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt", category: "Belief", icon: "🌟" },
  { text: "Your calm mind is the ultimate weapon against your challenges.", author: "Bryant McGill", category: "Calm", icon: "🧘" },
  { text: "The present moment is filled with joy and happiness. If you are attentive, you will see it.", author: "Thich Nhat Hanh", category: "Mindfulness", icon: "🌸" },
  { text: "Stress is caused by being 'here' but wanting to be 'there'.", author: "Eckhart Tolle", category: "Wisdom", icon: "🌊" },
  { text: "Breathe. Let go. And remind yourself that this very moment is the only one you know you have for sure.", author: "Oprah Winfrey", category: "Breathing", icon: "🌬️" },
  { text: "It's not stress that kills us, it is our reaction to it.", author: "Hans Selye", category: "Stress", icon: "⚖️" },
  { text: "Almost everything will work again if you unplug it for a few minutes, including you.", author: "Anne Lamott", category: "Rest", icon: "🔌" },
  { text: "The greatest weapon against stress is our ability to choose one thought over another.", author: "William James", category: "Mindset", icon: "🧠" },
  { text: "Rest and self-care are so important. When you take time to replenish your spirit, it allows you to serve others from the overflow.", author: "Eleanor Brown", category: "Self-care", icon: "💖" },
  { text: "You can't pour from an empty cup. Take care of yourself first.", author: "Unknown", category: "Self-care", icon: "🥤" },
  { text: "The secret of health for both mind and body is not to mourn for the past, worry about the future, but to live the present moment wisely.", author: "Buddha", category: "Wisdom", icon: "🕉️" },
  { text: "Calmness is the cradle of power.", author: "Josiah Gilbert Holland", category: "Calm", icon: "😌" },
  { text: "The time to relax is when you don't have time for it.", author: "Sydney J. Harris", category: "Relaxation", icon: "🛋️" },
  { text: "Peace is the result of retraining your mind to process life as it is, rather than as you think it should be.", author: "Wayne Dyer", category: "Peace", icon: "🕊️" }
];

let currentQuote = null;

function getFavorites() {
  return JSON.parse(localStorage.getItem('tranquil_favorite_quotes') || '[]');
}

function saveFavorites(favorites) {
  localStorage.setItem('tranquil_favorite_quotes', JSON.stringify(favorites));
}

function getRandomQuote() {
  return quotes[Math.floor(Math.random() * quotes.length)];
}

function displayQuote(quote) {
  currentQuote = quote;
  const quoteIcon = document.getElementById('quoteIcon');
  const quoteText = document.getElementById('quoteText');
  const quoteAuthor = document.getElementById('quoteAuthor');
  const quoteCategory = document.getElementById('quoteCategory');
  const favBtn = document.getElementById('favoriteBtn');
  
  if (quoteIcon) quoteIcon.textContent = quote.icon;
  if (quoteText) quoteText.textContent = `"${quote.text}"`;
  if (quoteAuthor) quoteAuthor.textContent = `— ${quote.author}`;
  if (quoteCategory) quoteCategory.textContent = quote.category;
  
  const favorites = getFavorites();
  const isFavorite = favorites.some(f => f.text === quote.text);
  if (favBtn) {
    favBtn.textContent = isFavorite ? '💛' : '🤍';
    favBtn.classList.toggle('active', isFavorite);
  }
}

function newQuote() {
  displayQuote(getRandomQuote());
}

function toggleFavorite() {
  if (!currentQuote) return;
  
  let favorites = getFavorites();
  const index = favorites.findIndex(f => f.text === currentQuote.text);
  
  if (index === -1) {
    favorites.push(currentQuote);
    if (typeof showToast !== 'undefined') showToast('⭐ Added to favorites!');
  } else {
    favorites.splice(index, 1);
    if (typeof showToast !== 'undefined') showToast('Removed from favorites');
  }
  
  saveFavorites(favorites);
  displayQuote(currentQuote);
  renderFavorites();
}

function renderFavorites() {
  const favorites = getFavorites();
  const container = document.getElementById('favoritesList');
  
  if (!container) return;
  
  if (favorites.length === 0) {
    container.innerHTML = '<div class="journal-empty"><span class="empty-icon">💭</span>No favorite quotes yet</div>';
    return;
  }
  
  container.innerHTML = favorites.map((quote) => `
    <div style="padding: 12px; border-bottom: 1px solid var(--bg2); cursor: pointer;" onclick="displayQuoteByText('${quote.text.replace(/'/g, "\\'")}')">
      <div style="font-size: 0.9rem; line-height: 1.4;">"${quote.text.substring(0, 80)}${quote.text.length > 80 ? '...' : ''}"</div>
      <div style="font-size: 0.7rem; color: var(--purple); margin-top: 4px;">— ${quote.author}</div>
    </div>
  `).join('');
}

function displayQuoteByText(text) {
  const quote = quotes.find(q => q.text === text);
  if (quote) displayQuote(quote);
}

document.addEventListener('DOMContentLoaded', () => {
  if (typeof syncHeaderAvatar !== 'undefined') syncHeaderAvatar();
  newQuote();
  renderFavorites();
});
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js')
    .then(reg => console.log('Service Worker registered', reg))
    .catch(err => console.log('Service Worker failed', err));
}
</script>

</body>
</html>
